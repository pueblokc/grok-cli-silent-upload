<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 320" font-family="Segoe UI, system-ui, sans-serif" role="img" aria-label="Diagram: a home directory flowing through Grok CLI into a cloud upload, without the user knowing">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f38ba8"/>
    </marker>
    <marker id="arrb" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#89b4fa"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="780" height="320" rx="12" fill="#1e1e2e"/>
  <g transform="translate(10,10)">
  <!-- user + terminal -->
  <rect x="20" y="70" width="200" height="160" rx="12" fill="#181825" stroke="#45475a"/>
  <circle cx="70" cy="115" r="18" fill="none" stroke="#a6adc8" stroke-width="2.5"/>
  <path d="M45 165 Q70 135 95 165" fill="none" stroke="#a6adc8" stroke-width="2.5"/>
  <rect x="115" y="100" width="88" height="62" rx="6" fill="#11111b" stroke="#45475a"/>
  <text x="159" y="128" fill="#a6e3a1" font-family="Consolas,monospace" font-size="13" text-anchor="middle">&gt; hi_</text>
  <text x="120" y="205" fill="#cdd6f4" font-size="14" font-weight="600" text-anchor="middle">You, asking an</text>
  <text x="120" y="222" fill="#cdd6f4" font-size="14" font-weight="600" text-anchor="middle">innocent question</text>
  <!-- what user sees arrow -->
  <line x1="220" y1="115" x2="330" y2="115" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrb)"/>
  <text x="275" y="103" fill="#89b4fa" font-size="12" text-anchor="middle">what you see</text>
  <!-- CLI box -->
  <rect x="335" y="75" width="150" height="80" rx="12" fill="#181825" stroke="#89b4fa"/>
  <text x="410" y="108" fill="#cdd6f4" font-size="15" font-weight="700" text-anchor="middle">Grok CLI</text>
  <text x="410" y="130" fill="#a6adc8" font-size="12" text-anchor="middle">chat responses</text>
  <!-- hidden pipeline -->
  <line x1="120" y1="230" x2="120" y2="262" stroke="#f38ba8" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <rect x="30" y="265" width="185" height="30" rx="8" fill="none" stroke="#f38ba8" stroke-dasharray="6 4"/>
  <text x="122" y="285" fill="#f38ba8" font-size="12" text-anchor="middle">entire home dir scanned</text>
  <line x1="215" y1="280" x2="330" y2="280" stroke="#f38ba8" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <rect x="335" y="255" width="150" height="50" rx="8" fill="none" stroke="#f38ba8" stroke-dasharray="6 4"/>
  <text x="410" y="276" fill="#f38ba8" font-size="12" text-anchor="middle">upload_queue</text>
  <text x="410" y="293" fill="#f38ba8" font-size="12" text-anchor="middle">51.7 GB / 25,116 files</text>
  <line x1="485" y1="280" x2="580" y2="230" stroke="#f38ba8" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6 4"/>
  <text x="540" y="278" fill="#f38ba8" font-size="12" text-anchor="middle">.tar.gz ×3</text>
  <!-- cloud -->
  <g>
    <ellipse cx="640" cy="180" rx="85" ry="48" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
    <ellipse cx="590" cy="160" rx="40" ry="28" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
    <ellipse cx="685" cy="155" rx="45" ry="30" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
    <ellipse cx="640" cy="175" rx="83" ry="45" fill="#181825"/>
    <text x="640" y="172" fill="#f38ba8" font-size="14" font-weight="700" text-anchor="middle">vendor cloud</text>
    <text x="640" y="192" fill="#a6adc8" font-size="11.5" text-anchor="middle">(Google Cloud Storage)</text>
  </g>
  <text x="640" y="90" fill="#f9e2af" font-size="26" text-anchor="middle">&#9888;</text>
  <text x="278" y="248" fill="#f38ba8" font-size="12.5" font-style="italic" text-anchor="middle">what you don't see (dashed)</text>
  </g>
</svg>
